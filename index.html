<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Ettornano i Conti</title>
    <style>
        body {
            font-family: Georgia, serif;
            margin: 40px;
            background-color: #f4f4f4;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 48px;
            border-bottom: 3px solid black;
            padding-bottom: 10px;
        }

        .image {
            text-align: center;
            margin: 20px 0;
        }

        .image img {
            max-width: 100%;
            height: auto;
        }

        .columns {
            display: flex;
            gap: 20px;
        }

        .column {
            flex: 1;
            text-align: justify;
        }

        h2 {
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Ettornano i Conti</h1>

    <div class="image">
        <img src="immagine.jpg" alt="Immagine articolo">
    </div>

    <div class="columns">
        <div class="column">
            <h2>Sezione 1</h2>
            <p>Questo è il primo spazio di testo. Qui puoi inserire il contenuto principale dell'articolo.</p>
        </div>

        <div class="column">
            <h2>Sezione 2</h2>
            <p>Questo è il secondo spazio di testo. Può contenere approfondimenti o dettagli.</p>
        </div>

        <div class="column">
            <h2>Sezione 3</h2>
            <p>Questo è il terzo spazio di testo. Perfetto per opinioni o conclusioni.</p>
        </div>
    </div>
</div>

</body>
</html>
